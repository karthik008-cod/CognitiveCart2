<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Cognitive Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
            --accent: #6366f1; --accent-hover: #4f46e5;
            --text: #f8fafc; --text-muted: #94a3b8;
            --border: #334155; --success: #10b981; --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg);
            color: var(--text); padding-bottom: 50px; min-height: 100vh;
        }

        /* ── Navbar ── */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .top-bar h2 { font-size: 1.5rem; background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: #a78bfa; }

        /* ── Container ── */
        .container {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
        }

        .header { margin-bottom: 30px; }
        .header h1 { font-size: 2rem; margin-bottom: 5px; }
        .header p { color: var(--text-muted); }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 25px; display: flex; flex-direction: column;
            gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            position: relative; overflow: hidden;
        }
        .stat-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(135deg, var(--accent), #f97316);
        }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: #fff; }
        .stat-label { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* ── Layout ── */
        .dashboard-layout {
            display: grid; grid-template-columns: 2fr 1fr; gap: 25px;
        }
        @media (max-width: 900px) { .dashboard-layout { grid-template-columns: 1fr; } }

        .panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .panel h3 { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* ── Chart ── */
        .chart-container { position: relative; height: 300px; width: 100%; }

        /* ── History List ── */
        .history-list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .history-item {
            background: var(--surface2); padding: 15px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-query { font-weight: 600; color: #fff; font-size: 0.95rem; }
        .history-time { font-size: 0.8rem; color: var(--text-muted); }

        .not-logged-in { text-align: center; padding: 100px 20px; }
        .not-logged-in a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="top-bar">
        <h2 onclick="window.location.href='index.html'">🛒 Cognitive Cart</h2>
        <div class="nav-links">
            <a href="index.html">Search</a>
            <a href="watchlist.html">📊 Watchlist</a>
            <a href="profile.html" class="active">👤 Profile</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <div class="container" id="mainContainer">
        <div class="not-logged-in">
            <h2>You are not logged in.</h2>
            <p>Please <a href="index.html">Login</a> from the home page to view your profile analytics.</p>
        </div>
    </div>

    <script>
        const API_BASE = (() => {
            const port = location.port;
            if (location.protocol === "file:") return "http://localhost:3000/api";
            if (port === "5500" || port === "5501") return "http://localhost:3000/api";
            if (port === "3000") return "http://localhost:3000/api";
            return "/api"; 
        })();

        let userHistory = [];
        let watchlistData = [];

        window.onload = async () => {
            const user = localStorage.getItem("loggedUser");
            if (!user) return;

            document.getElementById("mainContainer").innerHTML = `
                <div class="header">
                    <h1>Welcome back, ${user.split('@')[0]} 👋</h1>
                    <p>Here is your personalized shopping analytics dashboard.</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="statSearches">0</div>
                        <div class="stat-label">Total Searches</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statWatchlist">0</div>
                        <div class="stat-label">Items Watched</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statSavings" style="color: var(--success)">₹0</div>
                        <div class="stat-label">Total Savings (Price Drops)</div>
                    </div>
                </div>

                <div class="dashboard-layout">
                    <div class="panel">
                        <h3>📈 Search Activity</h3>
                        <div class="chart-container">
                            <canvas id="activityChart"></canvas>
                        </div>
                    </div>
                    <div class="panel">
                        <h3>🕒 Recent Searches</h3>
                        <div class="history-list" id="historyList">
                            <p style="color:var(--text-muted)">Loading history...</p>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById("logoutBtn").addEventListener("click", () => {
                localStorage.removeItem("loggedUser");
                window.location.href = "index.html";
            });

            await Promise.all([fetchHistory(user), fetchWatchlist(user)]);
            renderDashboard();
        };

        async function fetchHistory(username) {
            try {
                const res = await fetch(`${API_BASE}/history/${encodeURIComponent(username)}`);
                if (res.ok) userHistory = await res.json();
            } catch (e) { console.error("Failed to load history:", e); }
        }

        async function fetchWatchlist(username) {
            try {
                const res = await fetch(`${API_BASE}/watchlist/${encodeURIComponent(username)}`);
                if (res.ok) watchlistData = await res.json();
            } catch (e) { console.error("Failed to load watchlist:", e); }
        }

        function renderDashboard() {
            // Stats
            document.getElementById("statSearches").innerText = userHistory.length;
            document.getElementById("statWatchlist").innerText = watchlistData.length;

            let savings = 0;
            watchlistData.forEach(item => {
                if (item.previousPrice && item.currentPrice < item.previousPrice) {
                    savings += (item.previousPrice - item.currentPrice);
                }
            });
            document.getElementById("statSavings").innerText = `₹${savings.toLocaleString()}`;

            // History List
            const listEl = document.getElementById("historyList");
            if (!userHistory.length) {
                listEl.innerHTML = `<p style="color:var(--text-muted)">No recent searches.</p>`;
            } else {
                listEl.innerHTML = [...userHistory].reverse().map(h => `
                    <div class="history-item">
                        <div class="history-query">${h.searchQuery}</div>
                        <div class="history-time">${h.time.split(',')[0]}</div>
                    </div>
                `).join("");
            }

            // Activity Chart (searches over last 7 days)
            renderActivityChart();
        }

        function renderActivityChart() {
            const ctx = document.getElementById('activityChart');
            if (!ctx) return;

            // Compute last 7 days
            const counts = {};
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                counts[d.toLocaleDateString("en-IN", { day: 'numeric', month: 'short' })] = 0;
            }

            userHistory.forEach(h => {
                try {
                    // Try to parse the localized date string safely
                    const parts = h.time.split('/');
                    if (parts.length >= 3) {
                        const d = new Date(`${parts[1]}/${parts[0]}/${parts[2].split(',')[0]}`);
                        const key = d.toLocaleDateString("en-IN", { day: 'numeric', month: 'short' });
                        if (counts[key] !== undefined) counts[key]++;
                    }
                } catch(e) {}
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        label: 'Searches',
                        data: Object.values(counts),
                        backgroundColor: 'rgba(99, 102, 241, 0.8)',
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
